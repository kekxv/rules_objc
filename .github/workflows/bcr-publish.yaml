name: Publish to BCR

on:
  # 允许其他 workflow 调用此 workflow
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
    secrets:
      PUBLISH_TOKEN: # 将原来的 BCR_PUBLISH_TOKEN 改为匹配你的新配置
        required: true
        
  # 允许在 GitHub Actions 界面手动触发
  workflow_dispatch:
    inputs:
      release_version:
        required: true
        type: string
        description: Release version to publish to the Bazel Central Registry
      is_prerelease:
        required: false
        type: boolean
        default: false
        description: Check if this is a prerelease (skips BCR publish if true)

jobs:
  # Job 4: 发布 BCR
  publish-to-bcr:
    name: Publish to BCR
    uses: kekxv/bcr/.github/workflows/publish_to_bcr.yml@publish-to-bcr
    with:
      tag_name: ${{ inputs.release_version }}
      module_name: "rules_objc"
    secrets:
      publish_token: ${{ secrets.PUBLISH_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
